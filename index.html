  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            bg:     'rgb(var(--bg) / <alpha-value>)',
            fg:     'rgb(var(--fg) / <alpha-value>)',
            card:   'rgb(var(--card) / <alpha-value>)',
            muted:  'rgb(var(--muted) / <alpha-value>)',
            accent: '#d88800',
            border: 'rgb(var(--border) / <alpha-value>)',
            brand:  { orange: '#d88800' },
          },
          fontFamily: {
            display: ['Cormorant Garamond', 'Georgia', 'serif'],
            body:    ['Inter', 'system-ui', 'sans-serif'],
            logo:      ['Lovelo', 'sans-serif'],
            signature: ['Holiday', 'cursive'],
          },
        },
      },
    };
  </script>
  <style>
    /* Lovelo Black (weight 900) loaded via CDNFonts */
    :root {
      --bg: 10 10 10;
      --fg: 240 237 232;
      --card: 15 15 15;
      --muted: 140 140 140;
      --border: 36 36 36;
      --sidebar-bg: 10 10 10;
    }
    html.light {
      --bg: 250 248 245;
      --fg: 28 26 24;
      --card: 255 255 255;
      --muted: 120 110 100;
      --border: 220 215 205;
      --sidebar-bg: 245 242 237;
    }
    html { font-size: 17px; }
    body { -webkit-font-smoothing: antialiased; }
    ::selection { background: #d888004d; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: rgb(var(--bg)); }
    ::-webkit-scrollbar-thumb { background: rgb(var(--border)); border-radius: 4px; }

    .fade-in  { animation: fadeIn 0.5s ease-out; }
    @keyframes fadeIn  { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .swatch-grow { animation: growUp 0.4s ease-out; transform-origin: bottom; }
    @keyframes growUp  { from { transform: scaleY(0); } to { transform: scaleY(1); } }

    /* Slider custom styling */
    input[type=range] { -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px; background: hsl(0 0% 14%); outline: none; cursor: pointer; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #d88800; cursor: pointer; border: 2px solid hsl(0 0% 4%); }
    input[type=range]::-moz-range-thumb    { width: 16px; height: 16px; border-radius: 50%; background: #d88800; cursor: pointer; border: 2px solid hsl(0 0% 4%); }

    /* Upload zone drag-over */
    .drag-over { border-color: #d88800 !important; background: #d8880010 !important; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* Sidebar PRO items - inactive style */
    .sidebar-pro {
      opacity: 0.4;
    }

    /* Premium overlay */
    .premium-overlay {
      position: fixed; inset: 0; z-index: 50;
      background: rgba(0,0,0,0.55);
      backdrop-filter: blur(14px);
      display: flex; align-items: center; justify-content: center;
      animation: fadeIn 0.4s ease-out;
    }
    .premium-modal {
      background: hsl(0 0% 6%);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 1rem;
      padding: 2.5rem 2rem;
      text-align: center;
      max-width: 360px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.6);
    }

    /* Impressão */
    @media print {
      body * { visibility: hidden; }
      #print-target, #print-target * {
        visibility: visible;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        color-adjust: exact !important;
      }
      #print-target { position: absolute; top: 0; left: 0; width: 100%; }
      nav, .no-print, #imp-preview-wrap { border: none !important; background: none !important; padding: 0 !important; }
      @page { margin: 12mm; }
    }
  </style>
</head>

    // localStorage.removeItem('tono_pro');

    // --- Translations ---
    const translations = {
      pt: {
        sidebar: {
          home: 'Início',
          tonocast: 'TonoCast',
          escala: 'Escala',
          treino: 'Treino',
          converter: 'Converter',
          posterizar: 'Posterizar',
          mapear: 'Mapear',
          risco: 'Risco',
          janela: 'Janela',
          quadricular: 'Quadricular',
          ilusao: 'Ilusão',

          localizarValor: 'Localizar Valor',
          extrairPaleta: 'Extrair Paleta',
          exercicios: 'Exercícios',
          analiseLuz: 'Análise de Luz',
          pro: 'Tono Pro',
          proDesc: 'Desbloqueie todas as ferramentas e domine os valores tonais.',
          acessarAgora: 'Acessar Agora'
        },
        premium: {

          cta: 'Acessar Agora',

        }
      },
      en: {
        sidebar: {
          home: 'Home',

          escala: 'Scale',
          treino: 'Training',
          converter: 'Convert',
          posterizar: 'Posterize',
          mapear: 'Map',
          risco: 'Sketch',
          janela: 'Window',
          quadricular: 'Grid',
          ilusao: 'Illusion',
          avancado: 'Advanced',
          localizarValor: 'Locate Value',
          extrairPaleta: 'Extract Palette',
          exercicios: 'Exercises',
          analiseLuz: 'Light Analysis',
          pro: 'Tono Pro',
          proDesc: 'Unlock all tools and master tonal values.',
          acessarAgora: 'Access Now'
        },
        premium: {
          title: 'PRO Tool',
          desc: 'Subscribe to Tono Pro to unlock all tools and master tonal values.',
          cta: 'Access Now',
          close: 'Close'
        }
      },
      es: {
        sidebar: {
          home: 'Inicio',
          tonocast: 'TonoCast',
          escala: 'Escala',
          treino: 'Entrenamiento',
          converter: 'Convertir',
          posterizar: 'Posterizar',
          mapear: 'Mapear',
          risco: 'Dibujo',
          janela: 'Ventana',
          quadricular: 'Cuadrícula',
          ilusao: 'Ilusión',
          avancado: 'Avanzado',
          localizarValor: 'Localizar Valor',
          extrairPaleta: 'Extraer Paleta',
          exercicios: 'Ejercicios',
          analiseLuz: 'Análisis de Luz',
          pro: 'Tono Pro',
          proDesc: 'Desbloquea todas las herramientas y domina los valores tonales.',
          acessarAgora: 'Acceder Ahora'
        },
        premium: {
          title: 'Herramienta PRO',
          desc: 'Suscríbete a Tono Pro para desbloquear todas las herramientas y dominar los valores tonales.',
          cta: 'Acceder Ahora',
          close: 'Cerrar'
        }
      }
    };

    let currentLang = localStorage.getItem('tono_lang') || 'pt';

    function toggleLangDropdown() {
      const dropdown = document.getElementById('lang-dropdown');
      const dropdownM = document.getElementById('lang-dropdown-m');
      if (dropdown) dropdown.classList.toggle('hidden');
      if (dropdownM) dropdownM.classList.toggle('hidden');
    }

    function setLanguage(lang) {
      currentLang = lang;
      localStorage.setItem('tono_lang', lang);
      document.documentElement.lang = lang === 'pt' ? 'pt-BR' : lang === 'es' ? 'es-ES' : 'en-US';
      
      // Update language labels
      const langLabel = lang.toUpperCase();
      const currentLangEl = document.getElementById('current-lang');
      const currentLangMEl = document.getElementById('current-lang-m');
      if (currentLangEl) currentLangEl.textContent = langLabel;
      if (currentLangMEl) currentLangMEl.textContent = langLabel;
      
      // Close dropdowns
      const dropdown = document.getElementById('lang-dropdown');
      const dropdownM = document.getElementById('lang-dropdown-m');
      if (dropdown) dropdown.classList.add('hidden');
      if (dropdownM) dropdownM.classList.add('hidden');
      
      applyTranslations();
      
      // Re-render current page to apply translations in dashboard
      const currentPage = window.location.hash.replace('#', '') || 'home';
      navigate(currentPage);
    }

    function applyTranslations() {
      const t = translations[currentLang];
      
      // Update elements with data-i18n
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        const keys = key.split('.');
        let value = t;
        for (const k of keys) {
          value = value?.[k];
        }
        if (value) el.textContent = value;
      });
    }

    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebar-overlay');
      sidebar.classList.toggle('-translate-x-full');
      overlay.classList.toggle('hidden');
    }

    function toggleTheme() {
      const isLight = document.documentElement.classList.toggle('light');
      localStorage.setItem('tono_theme', isLight ? 'light' : 'dark');
      updateIcons();
      updateLogo();
    }

    function updateIcons() {
      const isLight = document.documentElement.classList.contains('light');
      document.querySelectorAll('#icon-moon, #icon-moon-m').forEach(el => el.classList.toggle('hidden', isLight));
      document.querySelectorAll('#icon-sun, #icon-sun-m').forEach(el => el.classList.toggle('hidden', !isLight));
    }

    function updateLogo() {
    }

    // Init theme
    const savedTheme = localStorage.getItem('tono_theme');
    if (savedTheme === 'light' || (!savedTheme && window.matchMedia('(prefers-color-scheme: light)').matches)) {
      document.documentElement.classList.add('light');
    }
    updateIcons();
    
    // Init language
    const savedLang = localStorage.getItem('tono_lang') || 'pt';
    setLanguage(savedLang);

    function showPremiumPopup() {
      const t = translations[currentLang].premium;
      const overlay = document.createElement('div');
      overlay.className = 'premium-overlay';
      overlay.onclick = (e) => { if (e.target === overlay) overlay.remove(); };
      overlay.innerHTML = `
        <div class="premium-modal">
          <div style="font-size:40px;margin-bottom:16px;">🔒</div>
          <h3 style="font-size:18px;font-weight:600;color:#fff;margin-bottom:8px;">${t.title}</h3>
          <p style="font-size:14px;color:#adaba5;margin-bottom:24px;line-height:1.5;">${t.desc}</p>
          <a href="sales-page.html" style="display:block;width:100%;padding:14px;border-radius:8px;background:linear-gradient(180deg,#e8c96a 0%,#d88800 55%,#b06e00 100%);color:#1c1200;font-weight:700;font-size:15px;text-decoration:none;text-align:center;transition:transform .15s ease,box-shadow .15s ease;" onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 10px 24px rgba(212,175,55,0.35)'" onmouseout="this.style.transform='';this.style.boxShadow=''">${t.cta}</a>
          <button onclick="this.closest('.premium-overlay').remove()" style="margin-top:12px;background:none;border:none;color:#6b6b6e;font-size:13px;cursor:pointer;">${t.close}</button>
        </div>
      `;
      document.body.appendChild(overlay);
    }
  </script>
  <script src="dashboard.js"></script>
  <script src="tono-chat-widget.js"></script>
</body>
</html>
