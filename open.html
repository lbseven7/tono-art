<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tono — Escala e Valor Tonal para Artistas</title>
  <meta name="description" content="Ferramentas interativas para aprender escala de cinzas, valores tonais e aplicar na prática da pintura.">

  <meta property="og:description" content="Ferramentas interativas para aprender escala de cinzas, valores tonais e aplicar na prática da pintura.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://tono.art.br/open">
  <meta property="og:image" content="https://tono.art.br/images/thumb-video.png">
  <meta property="og:site_name" content="Tono">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Tono — Escala e Valor Tonal para Artistas">
  <meta name="twitter:description" content="Ferramentas interativas para aprender escala de cinzas, valores tonais e aplicar na prática da pintura.">
  <meta name="twitter:image" content="https://tono.art.br/images/hero-site.jpg">
  <link rel="icon" href="images/logo-black3-sbg.png" type="image/png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500;600&family=Caveat:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            bg:     'rgb(var(--bg) / <alpha-value>)',
            fg:     'rgb(var(--fg) / <alpha-value>)',
            card:   'rgb(var(--card) / <alpha-value>)',
            muted:  'rgb(var(--muted) / <alpha-value>)',
            accent: '#d88800',
            border: 'rgb(var(--border) / <alpha-value>)',
            brand:  {
              orange: '#d88800',
              gold: '#c9a84c',
              sienna: '#a0522d',
              burnt: '#8b3a0f',
              ochre: '#cc7722',
              prussian: '#1b3a5c',
              rawUmber: '#826644',
            },
          },
          fontFamily: {
            display: ['Cormorant Garamond', 'Georgia', 'serif'],
            body:    ['DM Sans', 'system-ui', 'sans-serif'],
            hand:    ['Caveat', 'cursive'],
            logo:    ['Lovelo Line', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <style>
    @font-face { font-family: 'Lovelo Line'; src: url('fonts/lovelo/Lovelo Line Light.otf') format('opentype'); font-weight: 300; font-style: normal; font-display: swap; }
    @font-face { font-family: 'Lovelo Line'; src: url('fonts/lovelo/Lovelo Line Bold.otf') format('opentype'); font-weight: 700; font-style: normal; font-display: swap; }
    :root {
      --bg: 18 15 12;
      --fg: 240 237 232;
      --card: 28 24 20;
      --muted: 160 140 110;
      --border: 42 36 28;
      --sidebar-bg: 18 15 12;
    }
    html.light {
      --bg: 250 245 238;
      --fg: 28 24 20;
      --card: 255 253 250;
      --muted: 140 120 95;
      --border: 215 205 190;
      --sidebar-bg: 245 240 232;
    }
    body { -webkit-font-smoothing: antialiased; }
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 9999;
      pointer-events: none;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 200px 200px;
    }
    ::selection { background: #d888004d; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: rgb(var(--bg)); }
    ::-webkit-scrollbar-thumb { background: rgb(var(--border)); border-radius: 4px; }

    .fade-in  { animation: fadeIn 0.5s ease-out; }
    @keyframes fadeIn  { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    .swatch-grow { animation: growUp 0.4s ease-out; transform-origin: bottom; }
    @keyframes growUp  { from { transform: scaleY(0); } to { transform: scaleY(1); } }

    /* Organic border-radius overrides */
    .rounded-lg  { border-radius: 0.875rem !important; }
    .rounded-xl  { border-radius: 1.125rem !important; }
    .rounded-2xl { border-radius: 1.5rem !important; }
    .rounded-3xl { border-radius: 2rem !important; }

    /* Sidebar warm texture */
    #sidebar {
      background: linear-gradient(
        180deg,
        rgb(var(--sidebar-bg)) 0%,
        rgb(22 18 14 / 1) 100%
      ) !important;
      border-right: 1px solid rgba(216,136,0,0.06) !important;
    }
    #sidebar::before {
      content: '';
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0.02;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23d88800' fill-opacity='1'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    /* Slider custom styling */
    input[type=range] { -webkit-appearance: none; appearance: none; height: 4px; border-radius: 2px; background: hsl(0 0% 14%); outline: none; cursor: pointer; }
    input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; border-radius: 50%; background: #d88800; cursor: pointer; border: 2px solid hsl(0 0% 4%); }
    input[type=range]::-moz-range-thumb    { width: 16px; height: 16px; border-radius: 50%; background: #d88800; cursor: pointer; border: 2px solid hsl(0 0% 4%); }

    /* Upload zone drag-over */
    .drag-over { border-color: #d88800 !important; background: #d8880010 !important; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    /* Sidebar link hover glow */
    .sidebar-link {
      position: relative;
      overflow: hidden;
      transition: all 0.25s ease;
    }
    .sidebar-link::before {
      content: '';
      position: absolute;
      inset: 0;
      opacity: 0;
      background: linear-gradient(90deg, rgba(216,136,0,0.08) 0%, transparent 100%);
      transition: opacity 0.3s ease;
    }
    .sidebar-link:hover::before { opacity: 1; }
    .sidebar-link:hover { transform: translateX(4px); }
    .sidebar-link:active { transform: translateX(4px) scale(0.98); }

    /* Button press micro-animation */
    button { transition: transform 0.15s ease, opacity 0.15s ease; }
    button:active { transform: scale(0.96); }

    /* Card hover lift */
    .card-hover {
      transition: transform 0.3s ease, box-shadow 0.3s ease, border-color 0.3s ease;
    }
    .card-hover:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(216,136,0,0.08);
    }

    /* Accent glow on focus */
    input:focus, select:focus, textarea:focus {
      box-shadow: 0 0 0 2px rgba(216,136,0,0.25);
      transition: box-shadow 0.2s ease;
    }

    /* Impressão */
    @media print {
      body * { visibility: hidden; }
      #print-target, #print-target * {
        visibility: visible;
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
        color-adjust: exact !important;
      }
      #print-target { position: absolute; top: 0; left: 0; width: 100%; }
      nav, .no-print, #imp-preview-wrap { border: none !important; background: none !important; padding: 0 !important; }
      @page { margin: 12mm; }
    }
  </style>
</head>
<body class="bg-bg text-fg font-body min-h-screen overflow-x-hidden">

  <!-- Header (mobile) -->
  <header class="md:hidden fixed top-0 w-full z-50 backdrop-blur-xl bg-bg/80 border-b border-fg/5">
    <div class="px-4 h-14 flex items-center justify-between">
      <button onclick="navigate('home')" class="flex items-center gap-2.5">
        <img src="images/logo/tono-ouro-removebg-preview.png" alt="Tono" class="h-10" />
      </button>
      <div class="flex items-center gap-1">
        <button onclick="toggleTheme()" class="text-fg text-xl p-2" title="Alternar tema">
          <svg id="icon-moon-m" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 9.5A6.5 6.5 0 0 1 6.5 1a7 7 0 1 0 8.5 8.5z"/></svg>
          <svg id="icon-sun-m" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" class="hidden"><circle cx="9" cy="9" r="3.5"/><path d="M9 1v1M9 16v1M1 9h1M16 9h1M3.05 3.05l.7.7M14.25 14.25l.7.7M3.05 14.95l.7-.7M14.25 3.75l.7-.7"/></svg>
        </button>
        <button onclick="toggleSidebar()" class="text-fg text-xl p-2"><i class="fa-solid fa-bars"></i></button>
      </div>
    </div>
  </header>

  <!-- Sidebar overlay (mobile) -->
  <div id="sidebar-overlay" class="md:hidden fixed inset-0 bg-black/60 z-50 hidden" onclick="toggleSidebar()"></div>

  <!-- Sidebar -->
  <aside id="sidebar" class="fixed top-0 left-0 h-full w-60 bg-bg border-r border-fg/5 z-50 flex flex-col transition-transform duration-300 -translate-x-full md:translate-x-0">
    <div class="h-16 hidden md:flex items-center justify-between px-5 border-b border-fg/5">
      <button onclick="navigate('home')" class="flex items-center gap-2.5">
        <img src="images/logo/tono-ouro-removebg-preview.png" alt="Tono" class="h-10" />
      </button>
      <button onclick="toggleTheme()" id="theme-toggle" class="text-muted hover:text-fg transition-colors p-1.5 rounded-lg hover:bg-fg/5" title="Alternar tema">
        <svg id="icon-moon" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M15 9.5A6.5 6.5 0 0 1 6.5 1a7 7 0 1 0 8.5 8.5z"/></svg>
        <svg id="icon-sun" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" class="hidden"><circle cx="9" cy="9" r="3.5"/><path d="M9 1v1M9 16v1M1 9h1M16 9h1M3.05 3.05l.7.7M14.25 14.25l.7.7M3.05 14.95l.7-.7M14.25 3.75l.7-.7"/></svg>
      </button>
    </div>
    <nav class="flex-1 py-3 overflow-y-auto no-scrollbar">
      <button onclick="navigate('home'); toggleSidebar()" class="sidebar-link w-full flex items-center gap-3 px-5 py-2.5 text-[15px] text-muted hover:text-fg hover:bg-fg/5 transition-colors rounded-lg mx-1" data-sidebar="home"><i class="fa-solid fa-house w-5 text-center text-accent text-sm"></i> Inicio</button>
      <button onclick="navigate('ensino'); toggleSidebar()" class="sidebar-link w-full flex items-center gap-3 px-5 py-2.5 text-[15px] text-muted hover:text-fg hover:bg-fg/5 transition-colors rounded-lg mx-1" data-sidebar="ensino"><i class="fa-solid fa-graduation-cap w-5 text-center text-accent text-sm"></i> Ensino</button>
      <button onclick="navigate('escala'); toggleSidebar()" class="sidebar-link w-full flex items-center gap-3 px-5 py-2.5 text-[15px] text-muted hover:text-fg hover:bg-fg/5 transition-colors rounded-lg mx-1" data-sidebar="escala"><i class="fa-solid fa-sliders w-5 text-center text-accent text-sm"></i> Escala</button>
      <button onclick="navigate('treino'); toggleSidebar()" class="sidebar-link w-full flex items-center gap-3 px-5 py-2.5 text-[15px] text-muted hover:text-fg hover:bg-fg/5 transition-colors rounded-lg mx-1" data-sidebar="treino"><i class="fa-solid fa-brain w-5 text-center text-accent text-sm"></i> Treino</button>
      <button onclick="navigate('converter'); toggleSidebar()" class="sidebar-link w-full flex items-center gap-3 px-5 py-2.5 text-[15px] text-muted hover:text-fg hover:bg-fg/5 transition-colors rounded-lg mx-1" data-sidebar="converter"><i class="fa-solid fa-right-left w-5 text-center text-accent text-sm"></i> Converter</button>
      <button onclick="navigate('posterizar'); toggleSidebar()" class="sidebar-link w-full flex items-center gap-3 px-5 py-2.5 text-[15px] text-muted hover:text-fg hover:bg-fg/5 transition-colors rounded-lg mx-1" data-sidebar="posterizar"><i class="fa-solid fa-layer-group w-5 text-center text-accent text-sm"></i> Posterizar</button>
      <button onclick="navigate('zonas'); toggleSidebar()" class="sidebar-link w-full flex items-center gap-3 px-5 py-2.5 text-[15px] text-muted hover:text-fg hover:bg-fg/5 transition-colors rounded-lg mx-1" data-sidebar="zonas"><i class="fa-solid fa-map-location-dot w-5 text-center text-accent text-sm"></i> Mapear</button>
      <button onclick="navigate('riscoLinear'); toggleSidebar()" class="sidebar-link w-full flex items-center gap-3 px-5 py-2.5 text-[15px] text-muted hover:text-fg hover:bg-fg/5 transition-colors rounded-lg mx-1" data-sidebar="riscoLinear"><i class="fa-solid fa-pen-fancy w-5 text-center text-accent text-sm"></i> Risco</button>
      <button onclick="navigate('janela'); toggleSidebar()" class="sidebar-link w-full flex items-center gap-3 px-5 py-2.5 text-[15px] text-muted hover:text-fg hover:bg-fg/5 transition-colors rounded-lg mx-1" data-sidebar="janela"><i class="fa-solid fa-window-maximize w-5 text-center text-accent text-sm"></i> Janela</button>
      <button onclick="navigate('quadricular'); toggleSidebar()" class="sidebar-link w-full flex items-center gap-3 px-5 py-2.5 text-[15px] text-muted hover:text-fg hover:bg-fg/5 transition-colors rounded-lg mx-1" data-sidebar="quadricular"><i class="fa-solid fa-border-all w-5 text-center text-accent text-sm"></i> Quadricular</button>
      <button onclick="navigate('ilusao'); toggleSidebar()" class="sidebar-link w-full flex items-center gap-3 px-5 py-2.5 text-[15px] text-muted hover:text-fg hover:bg-fg/5 transition-colors rounded-lg mx-1" data-sidebar="ilusao"><i class="fa-solid fa-eye w-5 text-center text-accent text-sm"></i> Ilusao</button>
      <div class="mx-5 my-2 border-t border-fg/5"></div>
      <p class="px-5 py-1 text-[11px] uppercase tracking-[0.2em] text-muted/50">Hiperrealismo</p>
      <button onclick="navigate('localizador'); toggleSidebar()" class="sidebar-link w-full flex items-center gap-3 px-5 py-2.5 text-[15px] text-muted hover:text-fg hover:bg-fg/5 transition-colors rounded-lg mx-1" data-sidebar="localizador"><i class="fa-solid fa-crosshairs w-5 text-center text-accent text-sm"></i> Localizar Valor</button>
      <button onclick="navigate('paleta'); toggleSidebar()" class="sidebar-link w-full flex items-center gap-3 px-5 py-2.5 text-[15px] text-muted hover:text-fg hover:bg-fg/5 transition-colors rounded-lg mx-1" data-sidebar="paleta"><i class="fa-solid fa-palette w-5 text-center text-accent text-sm"></i> Extrair Paleta</button>
      <button onclick="navigate('exercicios'); toggleSidebar()" class="sidebar-link w-full flex items-center gap-3 px-5 py-2.5 text-[15px] text-muted hover:text-fg hover:bg-fg/5 transition-colors rounded-lg mx-1" data-sidebar="exercicios"><i class="fa-solid fa-book-open w-5 text-center text-accent text-sm"></i> Exercicios</button>
      <button onclick="navigate('luz'); toggleSidebar()" class="sidebar-link w-full flex items-center gap-3 px-5 py-2.5 text-[15px] text-muted hover:text-fg hover:bg-fg/5 transition-colors rounded-lg mx-1" data-sidebar="luz"><i class="fa-solid fa-sun w-5 text-center text-accent text-sm"></i> Analise de Luz</button>
      <button onclick="navigate('tutoriais'); toggleSidebar()" class="sidebar-link w-full flex items-center gap-3 px-5 py-2.5 text-[15px] text-muted hover:text-fg hover:bg-fg/5 transition-colors rounded-lg mx-1" data-sidebar="tutoriais"><i class="fa-solid fa-play-circle w-5 text-center text-accent text-sm"></i> Tutoriais</button>
    </nav>
  </aside>

  <main id="app" class="pt-14 md:pt-16 md:ml-60"></main>

  <script>
    // Ativar pro automaticamente para versão demo
    localStorage.setItem('tono_pro', 'true');

    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const overlay = document.getElementById('sidebar-overlay');
      sidebar.classList.toggle('-translate-x-full');
      overlay.classList.toggle('hidden');
    }

    function toggleTheme() {
      const isLight = document.documentElement.classList.toggle('light');
      localStorage.setItem('tono_theme', isLight ? 'light' : 'dark');
      updateIcons();
    }

    function updateIcons() {
      const isLight = document.documentElement.classList.contains('light');
      document.querySelectorAll('#icon-moon, #icon-moon-m').forEach(el => el.classList.toggle('hidden', isLight));
      document.querySelectorAll('#icon-sun, #icon-sun-m').forEach(el => el.classList.toggle('hidden', !isLight));
    }

    // Init theme
    const saved = localStorage.getItem('tono_theme');
    if (saved === 'light' || (!saved && window.matchMedia('(prefers-color-scheme: light)').matches)) {
      document.documentElement.classList.add('light');
    }
    updateIcons();
  </script>
  <script src="dashboard.js"></script>
</body>
</html>
